<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phản Hồi - Gian Hàng Đầm Hà</title>
    <style>
        /* Hệ thống màu đồng bộ với trang chủ */
        :root {
            --bg-color: #f9f6f0;
            --text-color: #333333;
            --header-bg: #2e7d32;
            --title-color: #d84315;
            --nav-bg: rgba(46, 125, 50, 0.95);
            --shadow-color: rgba(0, 0, 0, 0.1);
            --transition-speed: 0.3s;
        }

        body.dark-mode {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --header-bg: #1b5e20;
            --title-color: #ff8a65;
            --nav-bg: rgba(10, 46, 14, 0.95);
            --shadow-color: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            transition: background-color var(--transition-speed), color var(--transition-speed);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Thanh Menu tối giản (Chỉ có nút Back và nút Tối/Sáng) */
        nav {
            background-color: var(--nav-bg);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px var(--shadow-color);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }

        nav a.back-btn {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.05em;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: transform 0.3s ease;
        }

        nav a.back-btn:hover { transform: translateX(-5px); }

        #theme-toggle {
            background: transparent; border: none; font-size: 1.5em; cursor: pointer;
            width: 44px; height: 44px; border-radius: 50%;
            transition: transform 0.3s ease, background-color 0.3s ease;
            display: flex; align-items: center; justify-content: center;
        }

        #theme-toggle:hover {
            background-color: rgba(255, 255, 255, 0.2); transform: scale(1.1) rotate(15deg);
        }

        /* Nội dung giữa màn hình */
        .coming-soon-container {
            flex-grow: 1; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon {
            font-size: 4em;
            margin-bottom: 20px;
            animation: bounce 2s infinite ease-in-out;
            user-select: none;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h1 {
            color: var(--title-color);
            font-size: clamp(1.4em, 4vw, 2.2em);
            margin-bottom: 15px;
            max-width: 600px;
            line-height: 1.4;
        }

        .expected-time {
            font-size: 1.1em;
            font-style: italic;
            opacity: 0.6;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="back-btn">&larr; Về Trang Chủ</a>
        <button id="theme-toggle" aria-label="Đổi giao diện" title="Đổi màu nền">🌙</button>
    </nav>

    <main class="coming-soon-container">
        <div class="icon">🚧</div> 
        <h1>Tính năng chưa có sẵn, vui lòng chờ cập nhật trong tương lai.</h1>
        <p class="expected-time">Dự kiến: 6 ngày</p>
    </main>

    <script>
        const themeToggleBtn = document.getElementById('theme-toggle');
        if (themeToggleBtn) {
            themeToggleBtn.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                themeToggleBtn.innerHTML = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
            });
        }
    </script>
</body>
</html>
