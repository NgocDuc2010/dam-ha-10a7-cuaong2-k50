<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Góp ý - Gian Hàng Chợ Quê Đầm Hà</title>
    <link rel="stylesheet" href="style.css">
    <script>
        try { if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark-mode-init'); } catch (e) {}
    </script>
</head>
<body>

    <nav id="navbar">
        <div class="nav-container">
            <div class="nav-spacer"></div>
            <ul>
                <li><a href="index.html#gioi-thieu">Giới Thiệu</a></li>
                <li><a href="index.html#dia-diem">Cảnh Quan</a></li>
                <li><a href="index.html#trai-nghiem">Trải Nghiệm</a></li>
                <li><a href="index.html#dac-san">Ẩm Thực</a></li>
            </ul>
            <button id="theme-toggle" aria-label="Đổi giao diện" title="Đổi màu nền">🌙</button>
        </div>
    </nav>

    <header class="fade-in" style="padding: 120px 20px 60px 20px;">
        <h1 style="font-size: clamp(1.8em, 4vw, 3em);">Đánh Giá & Góp Ý</h1>
        <p>Cảm ơn bạn đã ghé thăm. Hãy để lại vài lời nhắn cho chúng mình nhé!</p>
    </header>

    <main class="container reveal">
        <div class="form-container card">
            <h2 class="form-title" style="text-align: center; color: var(--title-color); margin-bottom: 20px; font-size: 1.8em;">Gửi lời nhắn</h2>
            
            <form action="#" method="POST" class="custom-form">
                <div class="form-group">
                    <label for="name">Tên của bạn:</label>
                    <input type="text" id="name" name="name" placeholder="Ví dụ: Nguyễn Văn A" required>
                </div>
                
                <div class="form-group">
                    <label for="favorite">Bạn ấn tượng nhất với phần nào?</label>
                    <select id="favorite" name="favorite">
                        <option value="canh-quan">Cảnh Quan Thiên Nhiên</option>
                        <option value="van-hoa">Trải Nghiệm Văn Hóa</option>
                        <option value="am-thuc">Ẩm Thực Đặc Sản</option>
                        <option value="tat-ca">Mình thích tất cả!</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Góp ý thêm (Tùy chọn):</label>
                    <textarea id="message" name="message" rows="5" placeholder="Bạn có muốn chúng mình cải thiện điều gì không?"></textarea>
                </div>

                <div class="form-actions">
                    <a href="index.html" class="btn-secondary">← Trở về</a>
                    <button type="submit" class="feedback-btn" style="border: none; cursor: pointer;">Gửi Đi 🚀</button>
                </div>
            </form>
            
            <p class="beta-text" style="text-align: center; margin-top: 25px;">Đang trong giai đoạn thử nghiệm</p>
        </div>
    </main>

    <footer style="margin-top: auto;">
        <p><strong>Gian Hàng Chợ Quê Đầm Hà</strong> - Dự án của Lớp Chúng Mình</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
